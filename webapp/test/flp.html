<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FLP Sandbox</title>

  <script>
    window["sap-ushell-config"] = {
      defaultRenderer: "fiori2",
      applications: {
        "app-preview": {
          title: "Travel Processor RAP App",
          description: "Travel Processor RAP App",
          additionalInformation: "SAPUI5.Component=travelprocessorrap",
          applicationType: "URL",
          url: "../"
        }
      }
    };
  </script>

  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m,sap.ushell,sap.ui.fl"
    data-sap-ui-async="true"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-resourceroots='{
      "travelprocessorrap": "../"
    }'
    data-sap-ui-flexibilityServices='[{"connector":"LocalStorageConnector","layers":["USER"]}]'>
  </script>

  <script>
    sap.ui.getCore().attachInit(function () {
      sap.ushell.Container.createRenderer().placeAt("content");
    });
  </script>
</head>

<body class="sapUiBody" id="content"></body>
</html>
